<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KoNect - Khám phá nhóm</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #4a90e2; --bg: #121212; --card: #1e1e1e; --text: #eee; --border: #333; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }

        /* Header UI giống ảnh bạn gửi */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 10px 5%; background: #1a1a1a; border-radius: 12px; margin-bottom: 30px; }
        .logo { font-size: 24px; font-weight: bold; color: var(--primary); }
        .nav-btns button { background: #333; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; margin-left: 10px; }
        
        /* 4 Vùng chức năng theo yêu cầu */
        .box { background: var(--card); padding: 20px; border-radius: 15px; margin: 0 5% 20px 5%; border: 1px solid var(--border); display: none; }
        #vungDanhSach { display: block; border: none; background: transparent; }

        input { background: #2a2a2a; border: 1px solid #444; color: white; padding: 10px; border-radius: 6px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* Danh sách nhóm dạng Grid hiện đại */
        .group-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .group-card { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid var(--border); transition: 0.3s; }
        .group-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .group-name { font-size: 20px; font-weight: bold; color: var(--primary); margin-bottom: 10px; }
    </style>
</head>
<body>

<nav>
    <div class="logo">KoNect</div>
    <div id="user-display" style="font-size: 14px; color: #888;"></div>
    <div class="nav-btns">
        <button onclick="batTatTinhNang('vungTimKiem')">🔍 Tìm nhóm</button>
        <button onclick="batTatTinhNang('vungTaoNhom')">➕ Tạo mới</button>
        <button onclick="logout()" style="color: #ff4d4d;">Đăng xuất</button>
    </div>
</nav>

<div class="box" id="vungTimKiem">
    <h3>Tìm kiếm nhóm</h3>
    <input type="text" id="oTimKiem" placeholder="Nhập tên nhóm..." oninput="hamTimKiem()">
</div>

<div class="box" id="vungTaoNhom">
    <h3>Thiết lập nhóm mới</h3>
    <input type="text" id="tenNhomMoi" placeholder="Tên nhóm...">
    <input type="text" id="moTaNhom" placeholder="Mô tả ngắn...">
    <div style="margin: 10px 0;">
        <label><input type="checkbox" id="chkChat" checked> Cho phép tham gia chat công khai</label>
    </div>
    <button class="btn-main" onclick="hamTaoNhom(event)">Xác nhận Lập Nhóm</button>
</div>

<h2 style="text-align: center; margin-bottom: 30px;">Khám phá các nhóm học tập</h2>
<div id="vungDanhSach">
    <div class="group-grid" id="group-list">
        </div>
</div>

<script>
    // Config Supabase
    const SUPABASE_URL = 'https://dfbklcbregcxzngpiorx.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRmYmtsY2JyZWdjeHpuZ3Bpb3J4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NTI2MTIsImV4cCI6MjA4OTQyODYxMn0.3EOOOodNiaa46ptAksdTY43_vknTIxhejcJCbVN441w';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let dsNhomGlobal = [];

    // Logic Ẩn/Hiện vùng chức năng
    function batTatTinhNang(idVung) {
        const vung = document.getElementById(idVung);
        const dangHien = vung.style.display === "block";
        document.querySelectorAll('.box').forEach(b => b.style.display = "none");
        vung.style.display = dangHien ? "none" : "block";
    }

    // Tải dữ liệu từ Cloud
    async function loadGroups() {
        const { data, error } = await supabaseClient.from('groups').select('*').order('created_at', { ascending: false });
        if (!error) {
            dsNhomGlobal = data;
            renderGroups(data);
        }
    }

    // Tạo nhóm mới (Connect thẳng Cloud)
    async function hamTaoNhom(e) {
        e.preventDefault();
        const ten = document.getElementById('tenNhomMoi').value;
        const moTa = document.getElementById('moTaNhom').value;
        const coChat = document.getElementById('chkChat').checked;

        if (!ten) return alert("Vui lòng nhập tên nhóm!");

        const { error } = await supabaseClient.from('groups').insert([{ 
            name: ten, 
            description: moTa,
            is_public: coChat 
        }]);

        if (!error) {
            document.getElementById('tenNhomMoi').value = "";
            batTatTinhNang('vungTaoNhom');
            loadGroups();
        }
    }

    // Tìm kiếm Real-time
    function hamTimKiem() {
        const keyword = document.getElementById('oTimKiem').value.toLowerCase();
        const filtered = dsNhomGlobal.filter(n => n.name.toLowerCase().includes(keyword));
        renderGroups(filtered);
    }

    function renderGroups(groups) {
        const list = document.getElementById('group-list');
        if (groups.length === 0) {
            list.innerHTML = "<p>Không tìm thấy nhóm nào.</p>";
            return;
        }
        list.innerHTML = groups.map(g => `
            <div class="group-card">
                <div class="group-name">${g.name}</div>
                <div style="font-size:14px; color:#aaa; margin-bottom:15px;">${g.description || 'Không có mô tả.'}</div>
                <div style="font-size:12px; margin-bottom:10px;">${g.is_public ? '🔓 Công khai' : '🔒 Riêng tư'}</div>
                <button class="btn-main" style="width:100%" onclick="location.href='chat.html?room=${encodeURIComponent(g.name)}'">Tham gia</button>
            </div>
        `).join('');
    }

    window.onload = loadGroups;
</script>
</body>
</html>
