<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KoNect - Khám phá nhóm</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #4a90e2; --bg: #121212; --card: #1e1e1e; --text: #eee; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            /* Ẩn nội dung lúc đầu để tránh bị văng trang đột ngột */
            opacity: 0;
            transition: opacity 0.4s ease-in;
        }

        nav { display: flex; justify-content: space-between; align-items: center; padding: 10px 5%; background: #1a1a1a; border-radius: 12px; margin-bottom: 30px; }
        .logo { font-size: 24px; font-weight: bold; color: var(--primary); }
        .nav-btns button { background: #333; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; margin-left: 10px; }
        .nav-btns button:hover { background: #444; }

        .group-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 0 5%; }

        .group-card { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid #333; transition: 0.3s; position: relative; overflow: hidden; }
        .group-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .group-name { font-size: 20px; font-weight: bold; margin-bottom: 10px; color: var(--primary); }
        .group-desc { font-size: 14px; color: #aaa; margin-bottom: 20px; min-height: 40px; }
        .group-meta { font-size: 12px; color: #666; display: flex; justify-content: space-between; align-items: center; }

        .join-btn { width: 100%; background: var(--primary); color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .join-btn:hover { background: #357abd; }

        .loading-text { text-align: center; font-size: 18px; color: #888; margin-top: 50px; width: 100%; }
    </style>
</head>
<body>

<nav>
    <div class="logo">KoNect</div>
    <div id="user-display" style="font-size: 14px; color: #888;"></div>
    <div class="nav-btns">
        <button onclick="window.location.href='profile.html'">Hồ sơ</button>
        <button onclick="logout()" style="color: #ff4d4d;">Đăng xuất</button>
    </div>
</nav>

<h2 style="text-align: center; margin-bottom: 40px;">Khám phá các nhóm học tập</h2>

<div class="group-grid" id="group-list">
    <div class="loading-text">Đang tải danh sách nhóm...</div>
</div>

<script>
    const SUPABASE_URL = 'https://dfbklcbregcxzngpiorx.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRmYmtsY2JyZWdjeHpuZ3Bpb3J4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NTI2MTIsImV4cCI6MjA4OTQyODYxMn0.3EOOOodNiaa46ptAksdTY43_vknTIxhejcJCbVN441w';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function init() {
        try {
            // Bước 1: Kiểm tra Session (nhanh hơn getUser)
            const { data: { session }, error: authError } = await supabaseClient.auth.getSession();

            if (authError || !session) {
                console.log("Chưa đăng nhập, chuyển hướng...");
                window.location.href = 'index.html';
                return;
            }

            // Bước 2: Hiển thị trang sau khi xác nhận Auth thành công
            document.body.style.opacity = "1";

            const user = session.user;
            const fallbackName = user.email.split('@')[0];
            const displayName = user.user_metadata?.display_name || fallbackName;
            document.getElementById('user-display').innerText = "Chào, " + displayName;

            // Bước 3: Lấy danh sách nhóm
            const { data: groups, error: dbError } = await supabaseClient
                .from('groups')
                .select('*');

            if (dbError) throw dbError;

            renderGroups(groups);

        } catch (err) {
            console.error("Lỗi khởi tạo:", err);
            window.location.href = 'index.html';
        }
    }

    function renderGroups(groups) {
        const list = document.getElementById('group-list');
        list.innerHTML = '';

        if (!groups || groups.length === 0) {
            list.innerHTML = '<div class="loading-text">Chưa có nhóm nào được tạo. Hãy là người đầu tiên!</div>';
            return;
        }

        groups.forEach(group => {
            const card = document.createElement('div');
            card.className = 'group-card';
            // Sử dụng group.title thay cho group.name để khớp Schema
            card.innerHTML = `
                <div class="group-name">${group.title || 'Nhóm không tên'}</div>
                <div class="group-desc">${group.description || 'Không có mô tả cho nhóm này.'}</div>
                <div class="group-meta">
                    <span>Mục tiêu: ${group.goal || 'Học tập'}</span>
                </div>
                <button class="join-btn" onclick="joinGroup('${group.id}')">Tham gia ngay</button>
            `;
            list.appendChild(card);
        });
    }

    async function logout() {
        await supabaseClient.auth.signOut();
        window.location.href = 'index.html';
    }

    function joinGroup(groupId) {
        // Tạm thời hiển thị alert để test
        alert("Yêu cầu tham gia nhóm ID: " + groupId + "\nTính năng Chat đang được hoàn thiện!");
    }

    // Chạy hàm khởi tạo
    init();
</script>
</body>
</html>
