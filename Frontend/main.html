<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KoNect - Khám phá nhóm</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #4a90e2; --bg: #121212; --card: #1e1e1e; --text: #eee; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg); color: var(--text);
            margin: 0; padding: 20px;
            /* QUAN TRỌNG: Ẩn trang để tránh bị văng nhầm khi đang load */
            display: none;
        }

        nav { display: flex; justify-content: space-between; align-items: center; padding: 10px 5%; background: #1a1a1a; border-radius: 12px; margin-bottom: 30px; }
        .logo { font-size: 24px; font-weight: bold; color: var(--primary); }
        .nav-btns button { background: #333; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; margin-left: 10px; }
        .nav-btns button:hover { background: #444; }

        .group-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 0 5%; }
        .group-card { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid #333; transition: 0.3s; position: relative; overflow: hidden; }
        .group-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .group-name { font-size: 20px; font-weight: bold; margin-bottom: 10px; color: var(--primary); }
        .group-desc { font-size: 14px; color: #aaa; margin-bottom: 20px; min-height: 40px; }
        .join-btn { width: 100%; background: var(--primary); color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

<nav>
    <div class="logo">KoNect</div>
    <div id="user-display" style="font-size: 14px; color: var(--primary); font-weight: bold;"></div>
    <div class="nav-btns">
        <button onclick="window.location.href='profile.html'">Hồ sơ</button>
        <button onclick="logout()" style="color: #ff4d4d;">Đăng xuất</button>
    </div>
</nav>

<h2 style="text-align: center; margin-bottom: 40px;">Khám phá các nhóm học tập</h2>

<div class="group-grid" id="group-list">
    <div style="text-align: center; width: 100%;">Đang tải dữ liệu...</div>
</div>

<script>
    const SUPABASE_URL = 'https://dfbklcbregcxzngpiorx.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRmYmtsY2JyZWdjeHpuZ3Bpb3J4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NTI2MTIsImV4cCI6MjA4OTQyODYxMn0.3EOOOodNiaa46ptAksdTY43_vknTIxhejcJCbVN441w';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function init() {
        // 1. Dùng getSession để check auth cực nhanh
        const { data: { session } } = await supabaseClient.auth.getSession();

        if (!session) {
            // Chuyển hướng về index.html cụ thể để tránh lỗi đường dẫn
            window.location.replace('index.html');
            return;
        }

        // 2. Nếu có session, hiện trang ngay lập tức
        document.body.style.display = 'block';
        const user = session.user;

        // 3. Kết nối bảng 'profiles' để lấy tên hiển thị
        const { data: profile } = await supabaseClient
            .from('profiles')
            .select('full_name, username')
            .eq('id', user.id)
            .single();

        let displayName = user.email.split('@')[0];
        if (profile) {
            displayName = profile.full_name || profile.username || displayName;
        }
        document.getElementById('user-display').innerText = "Chào, " + displayName;

        // 4. Lấy danh sách nhóm (Sửa cột 'name' thành 'title' cho đúng schema của bạn)
        const { data: groups, error } = await supabaseClient
            .from('groups')
            .select('*');

        if (error) {
            console.error("Lỗi lấy dữ liệu:", error);
            return;
        }

        renderGroups(groups);
    }

    function renderGroups(groups) {
        const list = document.getElementById('group-list');
        list.innerHTML = '';

        if (!groups || groups.length === 0) {
            list.innerHTML = '<div style="text-align: center; width: 100%;">Chưa có nhóm nào.</div>';
            return;
        }

        groups.forEach(group => {
            const card = document.createElement('div');
            card.className = 'group-card';
            // Lưu ý: Dùng group.title và group.description theo đúng bảng của bạn
            card.innerHTML = `
                <div class="group-name">${group.title || 'Nhóm không tên'}</div>
                <div class="group-desc">${group.description || 'Không có mô tả.'}</div>
                <button class="join-btn" onclick="joinGroup('${group.id}')">Tham gia ngay</button>
            `;
            list.appendChild(card);
        });
    }

    async function logout() {
        await supabaseClient.auth.signOut();
        window.location.replace('index.html');
    }

    function joinGroup(groupId) {
        alert("Đã gửi yêu cầu tham gia nhóm ID: " + groupId);
    }

    init();
</script>
</body>
</html>
