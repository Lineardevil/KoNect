<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KoNect - Khám phá nhóm</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root { 
            --primary: #4a90e2; 
            --bg: #121212; 
            --card: #1e1e1e; 
            --text: #eee; 
            --border: #333; 
            --btn-bg: #2a2a2a; 
        }

        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Segoe UI', sans-serif; 
            /* ÉP SÁT NỘI DUNG LÊN TRÊN CÙNG */
            padding: 0 20px 20px 20px; 
            min-height: 100vh;
        }

        /* NAVIGATION BAR - LOẠI BỎ VIỀN VÀ PADDING TRÊN */
        nav { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            /* GIẢM PADDING DƯỚI ĐỂ SÁT NỘI DUNG */
            padding: 10px 5% 5px 5%; 
            background: transparent; /* CHO PHÉP NỀN TRANG WEB HIỆN LÊN */
            /* LOẠI BỎ CÁC VIỀN */
            border: none; 
            border-radius: 0; 
            margin-bottom: 5px; /* SÁT NHAU HƠN VỚI TIÊU ĐỀ */
        }

        .logo { 
            font-size: 24px; 
            font-weight: bold; 
            color: var(--primary); 
            cursor: pointer; 
        }

        .nav-right { display: flex; align-items: center; gap: 15px; }

        /* NÚT BẤM BO 5PX VÀ MÀU SẮC GIỮ NGUYÊN */
        .custom-btn {
            background-color: var(--btn-bg);
            color: #fff;
            border: none;
            padding: 8px 18px;
            border-radius: 5px; 
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .custom-btn:hover { background-color: #383838; }
        
        .btn-create { background-color: var(--primary); font-weight: bold; }
        .btn-logout { color: #ff4d4d !important; }

        /* TIÊU ĐỀ GỌN */
        h2 { 
            text-align: center; 
            margin-bottom: 10px; /* SÁT NHAU HƠN VỚI THANH TÌM KIẾM */
            font-size: 24px;
            font-weight: bold;
        }

        /* THANH TÌM KIẾM - GIỮ ĐỘ DÀI (820PX) VÀ ĐƯỜNG THẲNG */
        .search-wrapper { 
            display: flex; 
            justify-content: center; 
            margin-bottom: 20px; /* GIẢM KHOẢNG CÁCH DƯỚI */
        }
        .search-container { 
            width: 100%; 
            max-width: 820px; 
        }
        .search-container input { 
            width: 100%; 
            background: #252525; 
            border: 1px solid var(--border); 
            border-radius: 0; 
            color: white; 
            padding: 12px 25px; 
            outline: none; 
            font-size: 16px;
        }
        .search-container input:focus { border-color: var(--primary); }

        /* GRID NHÓM - VIỀN THẲNG */
        .group-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 25px; 
            padding: 0 5%; 
        }
        
        .group-card { 
            background: var(--card); 
            border-radius: 0; 
            overflow: hidden; 
            border: 1px solid var(--border); 
            transition: 0.3s;
        }
        .group-card:hover { border-color: var(--primary); }

        .card-img { width: 100%; height: 160px; object-fit: cover; background: #252525; }
        .card-body { padding: 20px; }
        .group-name { font-size: 20px; font-weight: bold; color: var(--primary); margin-bottom: 8px; }

        .card-footer { 
            padding: 15px 20px; 
            border-top: 1px solid var(--border); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        /* Chặn hình tròn đen lỗi */
        div[class*="circle"], .circle { display: none !important; }
    </style>
</head>
<body>

<nav>
    <div class="logo" onclick="location.reload()">KoNect</div>
    <div class="nav-right">
        <span id="uName" style="color: #888; font-size: 13px;">Chào, Tester</span>
        <div class="nav-btns" style="display: flex; gap: 10px;">
            <button class="custom-btn" onclick="window.location.href='profile.html'">Hồ sơ</button>
            <button class="custom-btn btn-create" onclick="window.location.href='create.html'">Tạo nhóm</button>
            <button class="custom-btn btn-logout" onclick="window.location.href='index.html'">Đăng xuất</button>
        </div>
    </div>
</nav>

<h2>Khám phá nhóm học tập</h2>

<div class="search-wrapper">
    <div class="search-container">
        <input type="text" id="sInput" placeholder="🔍 Tìm kiếm tên nhóm..." oninput="search()">
    </div>
</div>

<div class="group-grid" id="group-list">
    </div>

<script>
    const S_URL = 'https://dfbklcbregcxzngpiorx.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRmYmtsY2JyZWdjeHpuZ3Bpb3J4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NTI2MTIsImV4cCI6MjA4OTQyODYxMn0.3EOOOodNiaa46ptAksdTY43_vknTIxhejcJCbVN441w';
    const supabaseClient = supabase.createClient(S_URL, S_KEY);

    let allGroups = [];

    async function init() {
        // Tạm thời giữ nguyên chào Tester, dữ liệu thật từ Supabase
        try {
            const { data, error } = await supabaseClient.from('groups').select('*').order('created_at', { ascending: false });
            if (!error) {
                allGroups = data || [];
                render(allGroups);
            }
        } catch (e) { console.log(e); }
    }

    function render(data) {
        const list = document.getElementById('group-list');
        list.innerHTML = data.length === 0 ? '<p style="text-align:center; width:100%; color:#666;">Chưa có nhóm nào.</p>' : '';
        
        data.forEach(g => {
            const card = document.createElement('div');
            card.className = 'group-card';
            const imgSrc = g.image_url || 'https://via.placeholder.com/400x160/252525/4a90e2?text=KoNect';
            
            card.innerHTML = `
                <img src="${imgSrc}" class="card-img">
                <div class="card-body">
                    <div class="group-name">${g.name || 'Nhóm không tên'}</div>
                    <p style="color:#aaa; font-size:14px;">${g.description || 'Không có mô tả.'}</p>
                </div>
                <div class="card-footer">
                    <span>${g.privacy === 'private' ? '🔒 Riêng tư' : '🌍 Mở'}</span>
                    <button class="custom-btn btn-create" style="padding: 6px 15px; font-size: 13px;">Tham gia</button>
                </div>
            `;
            list.appendChild(card);
        });
    }

    function search() {
        const v = document.getElementById('sInput').value.toLowerCase().trim();
        render(allGroups.filter(g => (g.name || '').toLowerCase().includes(v)));
    }

    init();
</script>
</body>
</html>
