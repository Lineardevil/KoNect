<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Box - Konect</title>
    <style>
        /* Reset body cho bám sát màn hình */
        body {
            font-family: Arial, sans-serif;
            background-color: #18191a;
            margin: 0;
            height: 100vh;
            color: #e4e6eb;
        }

        /* Layout 2 cột thần thánh */
        #messenger-layout {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        /* Cột trái (Sidebar) */
        #sidebar {
            width: 350px; /* Độ rộng cột danh sách */
            background-color: #242526;
            border-right: 1px solid #3e4042;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
            border-bottom: 1px solid #3e4042;
        }

        .friend-list {
            overflow-y: auto;
            flex: 1;
            padding: 10px;
        }

        .friend-item {
            padding: 15px;
            margin-bottom: 5px;
            border-radius: 8px;
            cursor: pointer;
            background-color: transparent;
        }

        .friend-item:hover {
            background-color: #3a3b3c;
        }

        /* Cột phải (Khung chat cũ của mày) */
        #chat-container {
            flex: 1; /* Chiếm toàn bộ phần diện tích còn lại */
            background-color: #242526;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            /* Đã bỏ cái width: 400px và cái border đi cho nó bung lụa */
        }

        /* CSS cho màn hình chờ (Empty State) */
        #empty-state {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            text-align: center;
            padding: 20px;
            color: #b0b3b8;
        }

        /* CSS cho thanh tiêu đề và nút quay lại */
        #chat-header {
            padding: 10px 15px;
            border-bottom: 1px solid #3e4042;
            display: flex;
            align-items: center;
            background-color: #242526;
        }

        #back-btn {
            background-color: transparent;
            color: #b0b3b8;
            border: none;
            cursor: pointer;
            font-size: 14px;
            padding: 5px 10px;
            border-radius: 5px;
            margin-right: 15px;
        }

        #back-btn:hover {
            background-color: #3a3b3c;
            color: #e4e6eb;
        }

        #empty-state p {
            font-size: 16px;
            margin-top: 15px;
            line-height: 1.5;
        }

        /* Nút test (sau này xoá đi) */
        #test-join-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #3a3b3c;
            color: #e4e6eb;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        #test-join-btn:hover { background-color: #4e4f50; }

        /* Vùng hiển thị tin nhắn */
        #chat-box {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background-color: #242526;
        }

        /* Tùy chỉnh thanh cuộn cho tone tối */
        #chat-box::-webkit-scrollbar {
            width: 6px;
        }
        #chat-box::-webkit-scrollbar-thumb {
            background-color: #3e4042;
            border-radius: 3px;
        }

        /* --- BẮT ĐẦU PHẦN CSS TIN NHẮN MỚI --- */
        /* Bao bọc cả Tên và Bong bóng chat */
        .message-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 75%;
            margin-bottom: 5px;
        }

        /* Phe của người khác (Nằm lề trái) */
        .message-wrapper.left {
            align-self: flex-start;
        }

        /* Phe của mình (Nằm lề phải) */
        .message-wrapper.right {
            align-self: flex-end;
            align-items: flex-end; /* Ép bong bóng chat dạt sang phải */
        }

        /* Tên người gửi (Chỉ hiện cho người khác) */
        .sender-name {
            font-size: 12px;
            color: #8a8d91; /* Màu chữ tên mờ mờ cho tone tối */
            margin-bottom: 4px;
            margin-left: 12px;
        }

        /* Giao diện bong bóng chat chung */
        .message {
            max-width: 100%;
            padding: 10px 15px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        /* Màu nền cho người khác (Giống y hệt lúc đầu) */
        .message.other {
            background-color: #3e4042;
            color: #e4e6eb;
        }

        /* Màu nền cho mình (Tone tối, có viền đen đậm) */
        .message.self {
            background-color: #2b2b2e; /* Na ná màu nền khung chat */
            color: #aeafaf;
            border: 2.5px solid #121314; /* Viền đen đậm hơn nền */
            box-shadow: 0 4px 2px rgba(0,0,0,0.2); /* Thêm tí bóng đổ cho nó nổi lên */
        }
        /* --- KẾT THÚC PHẦN CSS TIN NHẮN MỚI --- */

        /* Chỗ nhập tin nhắn */
        #input-area {
            display: flex;
            padding: 10px;
            border-top: 1px solid #3e4042;
            background-color: #242526;
        }

        #message-input {
            flex: 1;
            padding: 10px 15px;
            border: none;
            background-color: #3a3b3c;
            color: #e4e6eb;
            border-radius: 20px;
            outline: none;
            font-size: 15px;
        }

        #message-input::placeholder {
            color: #b0b3b8;
        }

        /* Nút Gửi */
        #send-btn {
            background-color: transparent;
            color: #0084ff;
            border: none;
            padding: 0 15px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }

        #send-btn:hover {
            color: #1a91ff;
        }
    </style>
</head>

<body>

<div id="messenger-layout">

    <div id="sidebar">
        <div class="sidebar-header">Đoạn Chat</div>
        <div class="friend-list">
            <div class="sidebar-section">
                <div class="section-header" onclick="toggleSection('friends-list')">
                    <span>BẠN BÈ - FRIENDS</span>
                    <span class="arrow">▼</span>
                </div>
                <div id="friends-list" class="section-content">
                    <div class="friend-item" style="font-style: italic; color: #666;">Chưa có ai ở đây cả...</div>
                </div>
            </div>

            <div class="sidebar-section">
                <div class="section-header" onclick="toggleSection('groups-list')">
                    <span> CÁC NHÓM - GROUPS </span>
                    <span class="arrow">▼</span>
                </div>
                <div id="groups-list" class="section-content">
                </div>
            </div>
        </div>

    </div>

    <div id="chat-container">

        <div id="empty-state">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#b0b3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
            </svg>
            <p>Hãy tham gia một nhóm bất kỳ để giao lưu!</p>

        </div>

        <div id="join-state" style="display: none; flex-direction: column; justify-content: center; align-items: center; height: 100%; text-align: center; padding: 20px; color: #b0b3b8;">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#ff4d4f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            <p style="font-size: 16px; margin-top: 15px;">Bạn chưa là thành viên của nhóm này!</p>
            <button id="join-btn" style="margin-top: 15px; padding: 10px 20px; background-color: #0084ff; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">Tham gia </button>
        </div>

        <div id="chat-ui" style="display: none; flex-direction: column; height: 100%;">

            <div id="chat-header">
                <button id="back-btn" onclick="closeChatRoom()">&#8592; Quay lại</button>
                <span style="font-weight: bold;">Tên Nhóm Chat</span>
            </div>

            <div id="chat-box">
            </div>

            <div id="input-area">
                <input type="text" id="message-input" placeholder="Nhập tin nhắn...">
                <button id="send-btn">Gửi</button>
            </div>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    const supabaseUrl = 'https://dfbklcbregcxzngpiorx.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRmYmtsY2JyZWdjeHpuZ3Bpb3J4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NTI2MTIsImV4cCI6MjA4OTQyODYxMn0.3EOOOodNiaa46ptAksdTY43_vknTIxhejcJCbVN441w';
    const mySupabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    let globalUserId = null;
    let currentGroupId = null;
    let currentRealtimeChannel = null;

    async function initApp() {
        const { data: { user } } = await mySupabase.auth.getUser();
        if (user) {
            globalUserId = user.id;
            console.log("(<33) Đã nhận diện chính chủ: ", globalUserId);
        } else {
            globalUserId = 'cceab40a-0fef-4f21-9bba-c62273b139bb';
            console.warn("(!!!) Dùng ID Test tạm thời: ", globalUserId);
        }
        loadSidebar();
    }
    initApp();

    async function loadSidebar() {
        const { data, error } = await mySupabase
            .from('group_members')
            .select(`groups ( id, title )`)
            .eq('user_id', globalUserId)
            .eq('status', 'joined');

        if (error) return console.error("Lỗi lọc sidebar:", error);

        const groupsContainer = document.getElementById('groups-list');
        if (!groupsContainer) return;

        groupsContainer.innerHTML = '';

        if (data && data.length > 0) {
            data.forEach(item => {
                const group = item.groups;
                if (group) {
                    const div = document.createElement('div');
                    div.classList.add('friend-item');
                    div.innerText = group.title || "Nhóm vô danh :P ";
                    div.onclick = () => openChatRoom(group.id, group.title);
                    groupsContainer.appendChild(div);
                }
            });
        } else {
            groupsContainer.innerHTML = '<div style="padding:10px; font-size:12px; color:#888;">M chưa vào nhóm nào cả!</div>';
        }
    }

    async function openChatRoom(groupId, groupTitle) {
        currentGroupId = groupId;
        document.querySelector('#chat-header span').innerText = groupTitle;
        document.getElementById('empty-state').style.display = 'none';
        document.getElementById('chat-ui').style.display = 'flex';
        document.getElementById('join-state').style.display = 'none';
        document.getElementById('chat-box').innerHTML = '';

        await loadChatHistory(groupId);
        setupRealtimeListener(groupId);
    }

    // --- FIX LỖI THIẾU NGOẶC Ở ĐÂY ---
    async function loadChatHistory(groupId) {
        const { data, error } = await mySupabase
            .from('messages')
            .select(`
                *,
                sender:profiles ( full_name )
            `)
            .eq('group_id', groupId)
            .order('created_at', { ascending: true });

        if (error) return console.error("Lỗi load history:", error);

        if (data) {
            data.forEach(msg => {
                // LOGIC DỰ PHÒNG:
                // 1. Ưu tiên lấy full_name
                // 2. Nếu NULL, hiện "User-" + 4 ký tự cuối của ID cho nó giống Discord
                let displayName = "Người dùng ẩn danh";

                if (msg.sender && msg.sender.full_name) {
                    displayName = msg.sender.full_name;
                } else {
                    // Cắt 4 chữ cuối của UUID để phân biệt anh em
                    displayName = "User-" + msg.sender_id.substring(0, 4);
                }

                displayNewMessage(msg, displayName);
            });
        }
    } // Đã đóng ngoặc hàm loadChatHistory chuẩn chỉ!

    function setupRealtimeListener(groupId) {
        if (!groupId) return;
        if (currentRealtimeChannel) {
            mySupabase.removeChannel(currentRealtimeChannel);
        }

        currentRealtimeChannel = mySupabase
            .channel('room-' + groupId)
            .on(
                'postgres_changes',
                {
                    event: 'INSERT',
                    schema: 'public',
                    table: 'messages',
                },
                (payload) => {
                    if (payload.new.group_id === groupId) {
                        // Realtime ko trả về join profiles, nên tạm để là "Thành viên mới"
                        displayNewMessage(payload.new, "Thành viên mới");
                    }
                }
            )
            .subscribe();
    }

    async function sendMessage() {
        const input = document.getElementById('message-input');
        const content = input.value.trim();
        if (!content || !currentGroupId) return;

        const { error } = await mySupabase
            .from('messages')
            .insert([{
                content: content,
                group_id: currentGroupId,
                sender_id: globalUserId
            }]);

        if (error) alert("Lỗi: " + error.message);
        else input.value = '';
    }

    // GỘP 2 HÀM HIỂN THỊ THÀNH 1 BẢN XỊN
    function displayNewMessage(msg, senderName = "Đang tải...") {
        const chatBox = document.getElementById('chat-box');
        if (!chatBox) return;

        const wrapper = document.createElement('div');
        wrapper.classList.add('message-wrapper');

        const bubble = document.createElement('div');
        bubble.classList.add('message');
        bubble.innerText = msg.content;

        if (msg.sender_id === globalUserId) {
            wrapper.classList.add('right');
            bubble.classList.add('self');
            wrapper.appendChild(bubble);
        } else {
            wrapper.classList.add('left');
            bubble.classList.add('other');

            const nameLabel = document.createElement('div');
            nameLabel.classList.add('sender-name');
            nameLabel.innerText = senderName;

            wrapper.appendChild(nameLabel);
            wrapper.appendChild(bubble);
        }
        chatBox.appendChild(wrapper);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function toggleSection(id) {
        const content = document.getElementById(id);
        if (!content) return;
        content.style.display = (content.style.display === "none") ? "block" : "none";
    }

    document.getElementById('send-btn').onclick = sendMessage;
    document.getElementById('message-input').onkeydown = (e) => { if (e.key === 'Enter') sendMessage(); };
</script>

</body>
</html>
