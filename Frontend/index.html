<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KoNect - Đăng nhập & Đăng ký</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="/assets/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
      /* CSS ÉP GIAO DIỆN MINIMALIST DARK TỐI GIẢN */
      body {
        background-color: #121212 !important;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        /* ÁP DỤNG PHÔNG CHỮ MỚI CHO TOÀN BỘ TRANG */
        font-family: 'Poppins', sans-serif;
      }
      .auth-container .card {
        width: 420px;
        padding: 0;
        border-radius: 12px;
        background: #1c1c1c;
        border: 1px solid #2a2a2a;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7);
        overflow: hidden;
      }

      /* TÊN PROJECT KONECT ĐẶT Ở TRUNG TÂM */
      .brand-title {
        color: #4a90e2; /* Xanh KoNect */
        text-align: center;
        font-size: 34px; /* Tăng size một chút cho phông Poppins */
        font-weight: 800;
        margin: 0;
        padding: 30px 0 15px 0;
        letter-spacing: -1px;
        background: #181818;
      }

      /* BỘ ĐÔI TAB CHỌN */
      .tab-switcher {
        display: flex;
        border-bottom: 2px solid #2a2a2a;
        background: #181818;
      }
      .tab-btn {
        flex: 1;
        background: none;
        border: none;
        color: #777;
        padding: 18px;
        font-size: 13px;
        font-weight: 600; /* Giảm độ đậm một chút để chữ thanh thoát hơn */
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        transition: all 0.3s ease;
        text-align: center;
        outline: none;
        font-family: 'Poppins', sans-serif; /* Đảm bảo nút cũng dùng phông này */
      }
      .tab-btn:hover {
        color: #eee;
        background-color: #222;
      }
      .tab-btn.active {
        color: #4a90e2;
        background-color: #1c1c1c;
        border-bottom: 2px solid #4a90e2;
        margin-bottom: -2px;
      }

      /* FORM NHẬP LIỆU */
      .form-content {
        padding: 35px 40px 45px 40px;
      }
      .form-group {
        margin-bottom: 22px;
      }
      .form-group label {
        font-size: 11px;
        color: #888;
        margin-bottom: 10px;
        display: block;
        letter-spacing: 1px;
        text-transform: uppercase;
        font-weight: 500;
      }
      .form-group input {
        background: #252525;
        border: 1px solid #333;
        padding: 16px;
        font-size: 14px;
        border-radius: 8px;
        color: #eee;
        width: 100%;
        box-sizing: border-box;
        transition: border-color 0.2s;
        font-family: 'Poppins', sans-serif; /* Phông chữ cho ô nhập */
      }
      .form-group input:focus {
        border-color: #4a90e2;
        outline: none;
      }
      .form-group input::placeholder {
        color: #666;
      }

      .btn-primary {
        margin-top: 15px;
        padding: 16px;
        font-size: 14px;
        border-radius: 8px;
        font-weight: 600;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        background: #4a90e2;
        color: white;
        border: none;
        width: 100%;
        cursor: pointer;
        transition: background 0.2s, transform 0.1s;
        font-family: 'Poppins', sans-serif;
      }
      .btn-primary:hover {
        background: #357abd;
      }
      .btn-primary:active {
        transform: scale(0.98);
      }
      .status-msg {
        margin-top: 20px;
        text-align: center;
        font-size: 13px;
        min-height: 1.2em;
        font-weight: 500;
      }
    </style>
  </head>
  <body class="auth-body">
    <div class="auth-container">
      <div class="card">

        <h1 class="brand-title">KoNect</h1>

        <div class="tab-switcher">
          <button id="btnLoginTab" class="tab-btn active" onclick="setMode('login')">ĐĂNG NHẬP</button>
          <button id="btnRegisterTab" class="tab-btn" onclick="setMode('register')">ĐĂNG KÝ</button>
        </div>

        <div class="form-content">
          <div class="form-group">
            <label>EMAIL</label>
            <input type="email" id="email" placeholder="email@example.com" required />
          </div>

          <div class="form-group">
            <label>MẬT KHẨU</label>
            <input type="password" id="password" placeholder="Tối thiểu 6 ký tự" required />
          </div>

          <button id="authBtn" class="btn-primary">LOG IN</button>
          <div id="message" class="status-msg"></div>
        </div>

      </div>
    </div>

    <script>
      // KẾT NỐI SUPABASE
      const SUPABASE_URL = "https://dfbklcbregcxzngpiorx.supabase.co";
      const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRmYmtsY2JyZWdjeHpuZ3Bpb3J4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NTI2MTIsImV4cCI6MjA4OTQyODYxMn0.3EOOOodNiaa46ptAksdTY43_vknTIxhejcJCbVN441w";
      const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      let mode = "login";

      // HÀM XỬ LÝ CHUYỂN ĐỔI TAB CHỌN
      function setMode(newMode) {
        mode = newMode;
        const loginTab = document.getElementById("btnLoginTab");
        const registerTab = document.getElementById("btnRegisterTab");
        const authBtn = document.getElementById("authBtn");

        document.getElementById("message").innerText = "";

        if (mode === "login") {
            loginTab.classList.add("active");
            registerTab.classList.remove("active");
            authBtn.innerText = "LOG IN";
        } else {
            registerTab.classList.add("active");
            loginTab.classList.remove("active");
            authBtn.innerText = "REGISTER";
        }
      }

      // LOGIC XỬ LÝ CHÍNH
      document.getElementById("authBtn").onclick = async () => {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        if (!email || !password) {
          showStatus("Vui lòng nhập đủ thông tin!", "#ff9800");
          return;
        }
        showStatus("Đang xử lý...", "#888");

        if (mode === "register") {
          const { error } = await supabaseClient.auth.signUp({ email, password });
          if (error) showStatus("Lỗi: " + error.message, "#f44336");
          else showStatus("📩 Thành công! Kiểm tra Gmail để xác thực.", "#4caf50");
        } else {
          const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
          if (error) {
            showStatus("Tài khoản hoặc mật khẩu không đúng!", "#f44336");
          } else {
            showStatus("Đang vào hệ thống...", "#4caf50");
            setTimeout(() => (window.location.href = "/main"), 800);
          }
        }
      };

      // HÀM HIỂN THỊ TRẠNG THÁI
      function showStatus(text, color) {
        const msg = document.getElementById("message");
        msg.innerText = text;
        msg.style.color = color;
      }

      // KIỂM TRA ĐĂNG NHẬP SẴN
      async function checkUser() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) window.location.href = "/main";
      }
      checkUser();
    </script>
  </body>
</html>
