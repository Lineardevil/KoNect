<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project KoNect - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #4a90e2; --bg: #121212; --card: #1e1e1e; --text: #eee; --border: #333; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }

        .container { background: var(--card); padding: 35px; border-radius: 16px; width: 340px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        h1 { color: var(--primary); margin: 0 0 25px 0; text-align: center; font-size: 26px; letter-spacing: -1px; }

        .tabs { display: flex; margin-bottom: 25px; gap: 10px; }
        .tab { flex: 1; padding: 8px; cursor: pointer; color: #666; transition: 0.3s; text-align: center; font-size: 13px; font-weight: 600; border-bottom: 2px solid transparent; }
        .tab.active { color: var(--primary); border-bottom: 2px solid var(--primary); }

        .form-group { margin-bottom: 18px; text-align: left; }
        label { display: block; font-size: 11px; color: #888; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }

        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: #252525; color: white; box-sizing: border-box; outline: none; transition: 0.3s; font-size: 14px; }
        input:focus { border-color: var(--primary); }

        .password-wrapper { position: relative; }
        .password-wrapper input { padding-right: 40px; }

        .toggle-password {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            cursor: pointer; display: flex; align-items: center; opacity: 0.5; transition: 0.2s;
        }
        .toggle-password:hover { opacity: 1; }
        .toggle-password svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        button#authBtn { width: 100%; padding: 14px; border: none; border-radius: 8px; background: var(--primary); color: white; cursor: pointer; font-weight: bold; font-size: 15px; margin-top: 10px; transition: 0.3s; }
        button#authBtn:hover { background: #357abd; transform: translateY(-1px); }

        /* Link quên mật khẩu */
        .forgot-link { display: block; margin-top: 15px; font-size: 12px; color: #666; text-decoration: none; transition: 0.3s; text-align: center; }
        .forgot-link:hover { color: var(--primary); }

        #message { margin-top: 20px; font-size: 13px; min-height: 40px; line-height: 1.5; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>KoNect</h1>

    <div class="tabs">
        <div id="tabLogin" class="tab active" onclick="switchTab('login')">ĐĂNG NHẬP</div>
        <div id="tabRegister" class="tab" onclick="switchTab('register')">ĐĂNG KÝ</div>
    </div>

    <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="example@gmail.com" required>
    </div>

    <div class="form-group">
        <label>Mật khẩu</label>
        <div class="password-wrapper">
            <input type="password" id="password" placeholder="Tối thiểu 6 ký tự" required>
            <span id="togglePassword" class="toggle-password">
                <svg id="eyeIcon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </span>
        </div>
    </div>

    <button id="authBtn">Đăng nhập</button>

    <a href="#" id="forgotBtn" class="forgot-link">Quên mật khẩu?</a>

    <div id="message"></div>
</div>

<script>
    const SUPABASE_URL = 'https://dfbklcbregcxzngpiorx.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRmYmtsY2JyZWdjeHpuZ3Bpb3J4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NTI2MTIsImV4cCI6MjA4OTQyODYxMn0.3EOOOodNiaa46ptAksdTY43_vknTIxhejcJCbVN441w';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let mode = 'login';
    const passwordInput = document.getElementById('password');
    const togglePasswordBtn = document.getElementById('togglePassword');
    const eyeIcon = document.getElementById('eyeIcon');

    // 1. XỬ LÝ ẨN/HIỆN MẬT KHẨU
    togglePasswordBtn.addEventListener('click', function () {
        const isPassword = passwordInput.getAttribute('type') === 'password';
        passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
        if (isPassword) {
            eyeIcon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
        } else {
            eyeIcon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
        }
    });

    // 2. CHUYỂN TAB
    function switchTab(newMode) {
        mode = newMode;
        document.getElementById('tabLogin').className = mode === 'login' ? 'tab active' : 'tab';
        document.getElementById('tabRegister').className = mode === 'register' ? 'tab active' : 'tab';
        document.getElementById('authBtn').innerText = mode === 'login' ? 'Đăng nhập' : 'Tạo tài khoản mới';
        document.getElementById('message').innerText = '';
        // Ẩn link quên mật khẩu khi ở tab đăng ký
        document.getElementById('forgotBtn').style.display = mode === 'login' ? 'block' : 'none';
    }

    // 3. LOGIC XỬ LÝ CHÍNH (ĐĂNG NHẬP / ĐĂNG KÝ)
    document.getElementById('authBtn').onclick = async () => {
        const email = document.getElementById('email').value;
        const password = passwordInput.value;

        if (!email || !password) {
            showStatus("Vui lòng nhập đủ thông tin!", "#ff9800");
            return;
        }
        showStatus("Đang xử lý...", "#aaa");

        if (mode === 'register') {
            const { error } = await supabaseClient.auth.signUp({ email, password });
            if (error) showStatus("Lỗi: " + error.message, "#f44336");
            else showStatus("📩 Thành công! Hãy kiểm tra Gmail để xác thực.", "#4caf50");
        } else {
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) {
                const errMsg = error.message.toLowerCase();
                if (errMsg.includes("invalid login credentials")) showStatus("Mật khẩu không chính xác!", "#f44336");
                else if (errMsg.includes("email not confirmed")) showStatus("Tài khoản chưa xác thực Gmail!", "#f44336");
                else if (errMsg.includes("user not found")) showStatus("Email này chưa được đăng ký!", "#f44336");
                else showStatus("Lỗi: " + error.message, "#f44336");
            } else {
                showStatus("Đang vào hệ thống...", "#4caf50");
                // Chuyển hướng sang route /main đã cấu hình ở main.py
                setTimeout(() => window.location.href = '/main', 800);
            }
        }
    };

    // 4. LOGIC QUÊN MẬT KHẨU
    document.getElementById('forgotBtn').onclick = async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        if (!email) {
            showStatus("Nhập Email trước khi lấy lại mật khẩu!", "#ff9800");
            return;
        }
        showStatus("Đang gửi yêu cầu...", "#aaa");
        const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
            redirectTo: window.location.origin + '/reset-password',
        });
        if (error) showStatus("Lỗi: " + error.message, "#f44336");
        else showStatus("📩 Link đặt lại mật khẩu đã được gửi vào Gmail!", "#4caf50");
    };

    function showStatus(text, color) {
        const msg = document.getElementById('message');
        msg.innerText = text;
        msg.style.color = color;
    }

    // Tự động chuyển hướng nếu đã đăng nhập sẵn
    async function checkUser() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) window.location.href = '/main';
    }
    checkUser();
</script>
</body>
</html>
