<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KoNect - Đăng nhập</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="/assets/style.css">
  </head>
  <body class="auth-body">
    <div class="auth-container">

      <div class="logo-wrap">
        <div class="logo-icon">KN</div>
        <div class="tagline">Mạng xã hội học tập</div>
      </div>

      <div class="card">
        <h1>KoNect</h1>

        <div class="tabs">
          <div id="tabLogin" class="tab active" onclick="switchTab('login')">
            ĐĂNG NHẬP
          </div>
          <div id="tabRegister" class="tab" onclick="switchTab('register')">
            ĐĂNG KÝ
          </div>
        </div>

        <div class="form-group">
          <label>Email</label>
          <input
            type="email"
            id="email"
            placeholder="example@gmail.com"
            required
          />
        </div>

        <div class="form-group">
          <label>Mật khẩu</label>
          <div class="password-wrapper">
            <input
              type="password"
              id="password"
              placeholder="Tối thiểu 6 ký tự"
              required
            />
            <span id="togglePassword" class="toggle-password">
              <svg id="eyeIcon" viewBox="0 0 24 24">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </span>
          </div>
        </div>

        <button id="authBtn" class="btn-primary">Đăng nhập</button>

        <div class="divider" id="forgotDivider">
          <a href="#" id="forgotBtn" class="link-secondary">Quên mật khẩu?</a>
        </div>

        <div id="message" class="status-msg"></div>
      </div>
    </div>

    <script>
      // KẾT NỐI SUPABASE
      const SUPABASE_URL = "https://dfbklcbregcxzngpiorx.supabase.co";
      const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRmYmtsY2JyZWdjeHpuZ3Bpb3J4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NTI2MTIsImV4cCI6MjA4OTQyODYxMn0.3EOOOodNiaa46ptAksdTY43_vknTIxhejcJCbVN441w";
      const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      let mode = "login";
      const passwordInput = document.getElementById("password");
      const togglePasswordBtn = document.getElementById("togglePassword");
      const eyeIcon = document.getElementById("eyeIcon");

      // 1. XỬ LÝ ẨN/HIỆN MẬT KHẨU
      togglePasswordBtn.addEventListener("click", function () {
        const isPassword = passwordInput.getAttribute("type") === "password";
        passwordInput.setAttribute("type", isPassword ? "text" : "password");
        if (isPassword) {
          eyeIcon.innerHTML =
            '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
        } else {
          eyeIcon.innerHTML =
            '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
        }
      });

      // 2. CHUYỂN TAB
      function switchTab(newMode) {
        mode = newMode;
        document.getElementById("tabLogin").className = mode === "login" ? "tab active" : "tab";
        document.getElementById("tabRegister").className = mode === "register" ? "tab active" : "tab";
        document.getElementById("authBtn").innerText = mode === "login" ? "Đăng nhập" : "Tạo tài khoản mới";
        document.getElementById("message").innerText = "";

        // Ẩn/Hiện đường kẻ ngang (divider) chứa Quên mật khẩu
        document.getElementById("forgotDivider").style.display = mode === "login" ? "flex" : "none";
      }

      // 3. LOGIC XỬ LÝ CHÍNH (ĐĂNG NHẬP / ĐĂNG KÝ)
      document.getElementById("authBtn").onclick = async () => {
        const email = document.getElementById("email").value;
        const password = passwordInput.value;

        if (!email || !password) {
          showStatus("Vui lòng nhập đủ thông tin!", "var(--warning)");
          return;
        }
        showStatus("Đang xử lý...", "var(--text-muted)");

        if (mode === "register") {
          const { error } = await supabaseClient.auth.signUp({
            email,
            password,
          });
          if (error) showStatus("Lỗi: " + error.message, "var(--error)");
          else
            showStatus("📩 Thành công! Hãy kiểm tra Gmail để xác thực.", "var(--success)");
        } else {
          const { error } = await supabaseClient.auth.signInWithPassword({
            email,
            password,
          });
          if (error) {
            const errMsg = error.message.toLowerCase();
            if (errMsg.includes("invalid login credentials"))
              showStatus("Mật khẩu không chính xác!", "var(--error)");
            else if (errMsg.includes("email not confirmed"))
              showStatus("Tài khoản chưa xác thực Gmail!", "var(--error)");
            else if (errMsg.includes("user not found"))
              showStatus("Email này chưa được đăng ký!", "var(--error)");
            else showStatus("Lỗi: " + error.message, "var(--error)");
          } else {
            showStatus("Đang vào hệ thống...", "var(--success)");
            setTimeout(() => (window.location.href = "/main"), 800);
          }
        }
      };

      // 4. LOGIC QUÊN MẬT KHẨU
      document.getElementById("forgotBtn").onclick = async (e) => {
        e.preventDefault();
        const email = document.getElementById("email").value;
        if (!email) {
          showStatus("Nhập Email trước khi lấy lại mật khẩu!", "var(--warning)");
          return;
        }
        showStatus("Đang gửi yêu cầu...", "var(--text-muted)");
        const { error } = await supabaseClient.auth.resetPasswordForEmail(
          email,
          { redirectTo: window.location.origin + "/reset-password" },
        );
        if (error) showStatus("Lỗi: " + error.message, "var(--error)");
        else showStatus("📩 Link đặt lại mật khẩu đã được gửi vào Gmail!", "var(--success)");
      };

      // HÀM HIỂN THỊ TRẠNG THÁI (Đã sửa lại để dùng biến màu của CSS)
      function showStatus(text, color) {
        const msg = document.getElementById("message");
        msg.innerText = text;
        msg.style.color = color;
      }

      // KIỂM TRA ĐĂNG NHẬP
      async function checkUser() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) window.location.href = "/main";
      }
      checkUser();
    </script>
  </body>
</html>
