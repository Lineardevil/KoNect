<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>KoNect - Tạo nhóm</title>

<style>
* { box-sizing: border-box; }

:root {
    --bg: #181818;
    --text: #e5e5e5;
    --box: #242424;
    --tag-bg: #333;
    --tag-active: #4ade80;
    --input-bg: #2a2a2a;
    --border: #444;
}

body {
    font-family: "Segoe UI", Arial;
    background: var(--bg);
    color: var(--text);
    padding: 24px;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 30px;
}

.logo {
    font-size: 28px;
    font-weight: bold;
    cursor: pointer;
}

/* CONTAINER */
.container {
    max-width: 720px;
    margin: auto;
    background: var(--box);
    padding: 24px;
    border-radius: 20px;
    overflow: hidden;
}

/* SECTION */
.section { margin-bottom: 22px; }
.label {
    margin-bottom: 6px;
    font-size: 14px;
    font-weight: 600;
}

/* INPUT */
input, textarea {
    width: 100%;
    padding: 12px;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: var(--input-bg);
    color: var(--text);
}

/* UPLOAD */
.upload-box {
    width: 100%;
    height: 140px;
    border: 2px dashed var(--border);
    border-radius: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--input-bg);
    cursor: pointer;
    position: relative;
    overflow: hidden;
}

.upload-box:hover {
    border-color: var(--tag-active);
}

.upload-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.remove-img {
    position: absolute;
    top: 8px;
    right: 8px;
    background: red;
    color: white;
    border-radius: 50%;
    width: 22px;
    height: 22px;
    text-align: center;
    line-height: 22px;
    cursor: pointer;
    font-size: 14px;
}

/* PRIVACY */
.privacy-wrapper {
    display: flex;
    gap: 10px;
}

.privacy-option {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    text-align: center;
    background: var(--tag-bg);
    cursor: pointer;
}

.privacy-option.active {
    background: var(--tag-active);
    color: #000;
    font-weight: bold;
}

/* TAG */
.tag-box {
    background: var(--bg);
    padding: 15px;
    border-radius: 15px;
    border: 1px solid var(--border);
}

.category { margin-bottom: 14px; }

.category-title {
    margin-bottom: 6px;
    font-size: 13px;
    opacity: 0.8;
}

.tags-container {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

.tag {
    padding: 6px 12px;
    border-radius: 999px;
    background: var(--tag-bg);
    cursor: pointer;
}

.tag.active {
    background: var(--tag-active);
    color: #000;
    font-weight: bold;
}

.tag.disabled {
    opacity: 0.4;
    cursor: not-allowed;
}

/* CUSTOM */
.custom-container { margin-top: 12px; }
#customInput { margin-top: 10px; }

.tag .remove {
    margin-left: 6px;
    color: red;
    cursor: pointer;
}

/* BUTTON */
.btn {
    width: 100%;
    padding: 14px;
    background: var(--tag-active);
    color: #000;
    border: none;
    border-radius: 14px;
    font-weight: bold;
    cursor: pointer;
}

/* TOAST */
.toast {
    position: fixed;
    top: 20px;
    right: 20px;
    padding: 12px;
    color: white;
    border-radius: 6px;
    opacity: 0;
}
.toast.show { opacity: 1; }
.success { background: #22c55e; }
.error { background: #ef4444; }

/* SHAKE */
@keyframes shake {
    0% {transform:translateX(0);}
    25% {transform:translateX(-5px);}
    50% {transform:translateX(5px);}
    75% {transform:translateX(-5px);}
    100% {transform:translateX(0);}
}
.shake { animation: shake 0.3s; border:2px solid red !important; }
</style>
</head>

<body>

<div class="header">
    <div class="logo" onclick="goHome()">KoNect</div>
</div>

<div class="container">

<!-- UPLOAD -->
<div class="section">
    <div class="label">Chọn ảnh bìa cho nhóm của bạn</div>
    <div class="upload-box" onclick="triggerUpload()">
        <span id="uploadText">Click để chọn ảnh</span>
        <input type="file" id="coverInput" accept="image/*" hidden>
    </div>
</div>

<div class="section">
    <div class="label">Tên nhóm</div>
    <input id="name" placeholder="Nhập tên nhóm...">
</div>

<div class="section">
    <div class="label">Mô tả</div>
    <textarea id="desc" placeholder="Mô tả nhóm..."></textarea>
</div>

<div class="section">
    <div class="label">Số lượng tối đa</div>
    <input type="number" id="maxMember" placeholder="Tối đa 50">
</div>

<div class="section">
    <div class="label">Quyền riêng tư</div>
    <div class="privacy-wrapper">
        <div class="privacy-option active" onclick="selectPrivacy(this)" data-value="public">🌍 Public</div>
        <div class="privacy-option" onclick="selectPrivacy(this)" data-value="private">🔒 Private</div>
    </div>
</div>

<div class="section" id="tagSection">
    <div class="label">Tags (<span id="tagCount">0</span>/5)</div>

    <div class="tag-box">

        <div class="category">
            <div class="category-title">⚽ Thể thao</div>
            <div class="tags-container">
                <div class="tag">bóng đá</div>
                <div class="tag">bóng rổ</div>
                <div class="tag">gym</div>
            </div>
        </div>

        <div class="category">
            <div class="category-title">🎨 Sở thích</div>
            <div class="tags-container">
                <div class="tag">đọc sách</div>
                <div class="tag">nấu ăn</div>
                <div class="tag">vẽ tranh</div>
            </div>
        </div>

        <div class="category">
            <div class="category-title">💻 Công nghệ</div>
            <div class="tags-container">
                <div class="tag">lập trình</div>
                <div class="tag">AI</div>
                <div class="tag">web dev</div>
            </div>
        </div>

        <div class="custom-container">
            <b>Custom Tags</b>
            <div class="tags-container" id="customTags"></div>
            <input id="customInput" placeholder="Tự tạo custom tag">
        </div>

    </div>
</div>

<button class="btn" onclick="create()">Tạo nhóm</button>

</div>

<div id="toast" class="toast"></div>

<script>
let privacy="public";

// UPLOAD
function triggerUpload(){
    document.getElementById("coverInput").click();
}

document.getElementById("coverInput").addEventListener("change", function(e){
    let file = e.target.files[0];
    if(!file) return;

    let reader = new FileReader();
    reader.onload = function(event){
        let box = document.querySelector(".upload-box");

        box.innerHTML = `
            <img src="${event.target.result}">
            <div class="remove-img" onclick="removeImage(event)">×</div>
        `;
    }
    reader.readAsDataURL(file);
});

function removeImage(e){
    e.stopPropagation();
    let box = document.querySelector(".upload-box");
    box.innerHTML = `
        <span id="uploadText">Click để chọn ảnh</span>
        <input type="file" id="coverInput" accept="image/*" hidden>
    `;
}

// TAG
document.addEventListener("click", e=>{
    if(e.target.classList.contains("tag")){
        if(e.target.classList.contains("disabled")) return;
        e.target.classList.toggle("active");
        updateTags();
    }
});

function updateTags(){
    let all=document.querySelectorAll(".tag");
    let active=document.querySelectorAll(".tag.active");

    document.getElementById("tagCount").innerText=active.length;

    if(active.length>=5){
        all.forEach(t=>{
            if(!t.classList.contains("active")){
                t.classList.add("disabled");
            }
        });
    } else {
        all.forEach(t=>t.classList.remove("disabled"));
    }
}

// CUSTOM TAG
document.getElementById("customInput").addEventListener("keypress", e=>{
    if(e.key==="Enter"){
        let val=e.target.value.trim();
        if(!val) return;

        if(document.querySelectorAll(".tag.active").length>=5){
            toast("Tối đa 5 tag","error");
            return;
        }

        let t=document.createElement("div");
        t.className="tag active";
        t.innerHTML=val+' <span class="remove">×</span>';

        document.getElementById("customTags").appendChild(t);
        e.target.value="";
        updateTags();
    }
});

document.addEventListener("click", e=>{
    if(e.target.classList.contains("remove")){
        e.target.parentElement.remove();
        updateTags();
    }
});

// PRIVACY
function selectPrivacy(el){
    document.querySelectorAll(".privacy-option").forEach(e=>e.classList.remove("active"));
    el.classList.add("active");
    privacy=el.dataset.value;
}

// SHAKE
function shake(el){
    el.classList.add("shake");
    setTimeout(()=>el.classList.remove("shake"),300);
}

// TOAST
function toast(msg,type){
    let t=document.getElementById("toast");
    t.innerText=msg;
    t.className="toast show "+type;
    setTimeout(()=>t.classList.remove("show"),2000);
}

// CREATE
function create(){
    let name=document.getElementById("name");
    let desc=document.getElementById("desc");
    let member=document.getElementById("maxMember");

    let error=false;

    if(!name.value){shake(name); error=true;}
    if(!desc.value){shake(desc); error=true;}
    if(document.querySelectorAll(".tag.active").length==0){
        shake(document.getElementById("tagSection")); error=true;
    }
    if(member.value<1||member.value>50){
        shake(member); error=true;
    }

    if(error){
        toast("Thiếu thông tin!","error");
        return;
    }

    toast("Tạo nhóm thành công!","success");
}

function goHome(){
    window.location="main.html";
}
</script>

</body>
</html>
