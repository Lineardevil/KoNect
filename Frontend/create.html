<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>KoNect - Tạo nhóm</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cropperjs/dist/cropper.min.css">
<script src="https://cdn.jsdelivr.net/npm/cropperjs"></script>

<link rel="stylesheet" href="/assets/style.css">
</head>

<body class="create-page">

<div class="header">
    <div class="logo" onclick="goHome()">KoNect</div>
</div>

<div class="container">

<div class="section">
    <div class="label">Chọn ảnh bìa cho nhóm của bạn</div>
    <div class="upload-box" onclick="triggerUpload()">
        <span id="uploadText">Click để chọn ảnh</span>
    </div>
    <input type="file" id="coverInput" accept="image/*" hidden>
</div>

<div class="section">
    <div class="label">Tên nhóm</div>
    <input id="name" maxlength="50" placeholder="Nhập tên nhóm...">
</div>

<div class="section">
    <div class="label">Mô tả</div>
    <textarea id="desc" maxlength="200" placeholder="Mô tả nhóm..."></textarea>
</div>

<div class="section">
    <div class="label">Số lượng tối đa</div>
    <input type="number" id="maxMember" min="1" max="50" placeholder="Tối đa 50">
</div>

<div class="section">
    <div class="label">Quyền riêng tư</div>
    <div class="privacy-wrapper">
        <div class="privacy-option active" onclick="selectPrivacy(this)" data-value="public">Public</div>
        <div class="privacy-option" onclick="selectPrivacy(this)" data-value="private">Private</div>
    </div>
</div>

<div class="section" id="tagSection">
    <div class="label">Tags (<span id="tagCount">0</span>/5)</div>

    <div class="tag-box">

        <div class="category">
            <div class="category-title">Thể thao</div>
            <div class="tags-container">
                <div class="tag">bóng đá</div>
                <div class="tag">bóng rổ</div>
                <div class="tag">gym</div>
            </div>
        </div>

        <div class="category">
            <div class="category-title">Sở thích</div>
            <div class="tags-container">
                <div class="tag">đọc sách</div>
                <div class="tag">nấu ăn</div>
                <div class="tag">vẽ tranh</div>
            </div>
        </div>

        <div class="category">
            <div class="category-title">Công nghệ</div>
            <div class="tags-container">
                <div class="tag">lập trình</div>
                <div class="tag">AI</div>
                <div class="tag">web dev</div>
            </div>
        </div>

        <div class="custom-container">
            <b>Custom Tags</b>
            <div class="tags-container" id="customTags"></div>
            <input id="customInput" placeholder="Tự tạo custom tag">
        </div>

    </div>
</div>

<button class="btn" onclick="create()">Tạo nhóm</button>

</div>

<div id="toast" class="toast"></div>

<div id="cropModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); justify-content:center; align-items:center; z-index: 9999;">
    <div style="background:#222; padding:20px; border-radius:12px; width:90%; max-width:700px; max-height:90vh; display:flex; flex-direction:column;">
        <h3 style="color: white; margin-top: 0; margin-bottom: 15px;">Chỉnh sửa ảnh bìa</h3>

        <div style="flex: 1; min-height: 0; background: #000; border-radius: 8px; overflow: hidden; display: flex; align-items: center;">
            <img id="cropImage" style="display: block; max-width: 100%; max-height: 100%;">
        </div>

        <div style="margin-top:15px; display: flex; justify-content: flex-end; gap: 10px; flex-shrink: 0;">
            <button onclick="closeCropModal()" class="btn" style="background: #444; width: 100px;">Hủy</button>
            <button onclick="confirmCrop()" class="btn" style="width: 120px;">Crop & OK</button>
        </div>
    </div>
</div>

<script>
let privacy = "public";
let cropper;
let croppedBlob;

// ================= UPLOAD =================
function triggerUpload(){
    document.getElementById("coverInput").click();
}

document.getElementById("coverInput").addEventListener("change", handleUpload);

function handleUpload(e){
    let file = e.target.files[0];
    if(!file) return;

    if(file.size > 5 * 1024 * 1024){
        toast("Ảnh tối đa 5MB","error");
        e.target.value = "";
        return;
    }

    let imgURL = URL.createObjectURL(file);
    let image = document.getElementById("cropImage");

    // Hiển thị modal trước để cropper lấy kích thước khung chứa chính xác
    document.getElementById("cropModal").style.display = "flex";
    image.src = imgURL;

    // Thêm setTimeout để trình duyệt kịp hiển thị modal trước khi gọi Cropper
    setTimeout(() => {
        if(cropper) {
            cropper.replace(imgURL);
        } else {
            cropper = new Cropper(image, {
                aspectRatio: 16/9,
                viewMode: 1
            });
        }
    }, 50);
}

function confirmCrop(){
    if(!cropper) return;

    let canvas = cropper.getCroppedCanvas({
        width: 1920,
        height: 1080
    });

    if (!canvas) {
        toast("Vui lòng đợi ảnh tải xong", "error");
        return;
    }

    canvas.toBlob(blob => {
        croppedBlob = blob;

        let preview = URL.createObjectURL(blob);

        let box = document.querySelector(".upload-box");
        box.innerHTML = `
            <img src="${preview}" style="width: 100%; height: 100%; object-fit: cover; border-radius: inherit; display: block;">
            <div class="remove-img" onclick="removeImage(event)">×</div>
        `;

        document.getElementById("cropModal").style.display = "none";
        document.getElementById("coverInput").value = "";
    }, "image/jpeg", 0.9);
}

function closeCropModal() {
    document.getElementById("cropModal").style.display = "none";
    if (cropper) {
        cropper.destroy();
        cropper = null;
    }
    document.getElementById("coverInput").value = "";
}

function removeImage(e){
    e.stopPropagation();
    croppedBlob = null;

    let box = document.querySelector(".upload-box");
    box.innerHTML = `<span id="uploadText">Click để chọn ảnh</span>`;

    document.getElementById("coverInput").value = "";
}

// ================= TAG =================
document.addEventListener("click", e=>{
    if(e.target.classList.contains("tag")){
        if(e.target.classList.contains("disabled")) return;
        e.target.classList.toggle("active");
        updateTags();
    }
});

function updateTags(){
    let all = document.querySelectorAll(".tag");
    let active = document.querySelectorAll(".tag.active");

    document.getElementById("tagCount").innerText = active.length;

    if(active.length >= 5){
        all.forEach(t => {
            if(!t.classList.contains("active")){
                t.classList.add("disabled");
            }
        });
    } else {
        all.forEach(t => t.classList.remove("disabled"));
    }
}

// ================= CUSTOM TAG =================
document.getElementById("customInput").addEventListener("keypress", e=>{
    if(e.key === "Enter"){
        let val = e.target.value.trim();
        if(!val) return;

        if(document.querySelectorAll(".tag.active").length >= 5){
            toast("Tối đa 5 tag","error");
            return;
        }

        let t = document.createElement("div");
        t.className = "tag active";
        t.innerHTML = val + ' <span class="remove">×</span>';

        document.getElementById("customTags").appendChild(t);
        e.target.value = "";
        updateTags();
    }
});

document.addEventListener("click", e=>{
    if(e.target.classList.contains("remove")){
        e.target.parentElement.remove();
        updateTags();
    }
});

// ================= PRIVACY =================
function selectPrivacy(el){
    document.querySelectorAll(".privacy-option").forEach(e => e.classList.remove("active"));
    el.classList.add("active");
    privacy = el.dataset.value;
}

// ================= UI =================
function shake(el){
    el.classList.add("shake");
    setTimeout(() => el.classList.remove("shake"), 300);
}

function toast(msg, type){
    let t = document.getElementById("toast");
    t.innerText = msg;
    t.className = "toast show " + type;
    setTimeout(() => t.classList.remove("show"), 2000);
}

// ================= CREATE =================
async function create(){
    let name = document.getElementById("name");
    let desc = document.getElementById("desc");
    let member = document.getElementById("maxMember");

    let error = false;

    if(!name.value){shake(name); error = true;}
    if(!desc.value){shake(desc); error = true;}
    if(document.querySelectorAll(".tag.active").length == 0){
        shake(document.getElementById("tagSection")); error = true;
    }
    if(member.value < 1 || member.value > 50){
        shake(member); error = true;
    }

    if(error){
        toast("Thiếu thông tin!","error");
        return;
    }

    // VALIDATE TRƯỚC
    if(!croppedBlob){
        toast("Vui lòng chọn ảnh bìa","error");
        return;
    }

    if(name.value.length > 50){
        toast("Tên tối đa 50 ký tự","error");
        shake(name);
        return;
    }

    if(desc.value.length > 200){
        toast("Mô tả tối đa 200 ký tự","error");
        shake(desc);
        return;
    }

    let tags = Array.from(document.querySelectorAll(".tag.active"))
        .map(t => t.innerText.replace("×","").trim());

    let formData = new FormData();
    formData.append("name", name.value);
    formData.append("description", desc.value);
    formData.append("maxMember", member.value);
    formData.append("privacy", privacy);
    formData.append("tags", JSON.stringify(tags));
    formData.append("image", croppedBlob, "cover.jpg");

    try {
        let res = await fetch("/api/groups", {
            method: "POST",
            body: formData
        });

        let data = await res.json();

        if(res.ok){
            toast("Tạo nhóm thành công!","success");

            setTimeout(() => {
                window.location.href = "/main";
            }, 1200);
        } else {
            toast(data.message || "Tạo nhóm thất bại","error");
        }

    } catch(err){
        console.error(err);
        toast("Không kết nối được server","error");
    }
}

function goHome(){
    window.location.href = "/main";
}
</script>

</body>
</html>
