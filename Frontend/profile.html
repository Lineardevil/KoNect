<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KoNect - Hồ sơ cá nhân</title>
    <link rel="stylesheet" href="/assets/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="profile-layout">
    <div class="profile-header">
        <div class="avatar" id="user-avatar">?</div>
        <div class="profile-info">
            <h2 id="user-name">Đang tải...</h2>
            <p id="user-email">Đang tải...</p>
        </div>
    </div>

    <div class="profile-stats">
        <div class="stat-card">
            <div class="stat-num">0</div>
            <div class="stat-label">Nhóm đã tham gia</div>
        </div>
        <div class="stat-card">
            <div class="stat-num">0</div>
            <div class="stat-label">Bài viết</div>
        </div>
        <div class="stat-card">
            <div class="stat-num">0</div>
            <div class="stat-label">Đang theo dõi</div>
        </div>
    </div>
    
    <button onclick="window.location.href='/main.html'" style="padding: 10px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer;">Quay lại Trang chính</button>
</div>

<script>
    const SUPABASE_URL = 'https://dfbklcbregcxzngpiorx.supabase.co';
    const SUPABASE_KEY = 'YOUR_ANON_KEY_HERE'; // DO NOT LEAVE THIS EXPOSED IN PRODUCTION
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  async function loadProfile() {
          const { data: { user }, error } = await supabaseClient.auth.getUser();

          if (error || !user) {
              console.warn("Bouncer: No user found.");
              // Tell the UI why it's stuck:
              document.getElementById('user-email').innerText = "Guest (No session found)";
              document.getElementById('user-name').innerText = "Chưa đăng nhập";
              return; 
          }

          // If it gets past the 'return', it will fill this in:
          document.getElementById('user-email').innerText = user.email;
          const username = user.email.split('@')[0];
          document.getElementById('user-name').innerText = username;
          document.getElementById('user-avatar').innerText = username.charAt(0).toUpperCase();
      }

    loadProfile();
</script>
</body>
</html>
