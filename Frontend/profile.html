    <style>
:root {
    --primary: #007bff;
    --bg: #121212;
    --bg-2: #1e1e1e;
    --text: #ffffff;
    --text-muted: #b0b0b0;
    --border: #333;
    --card: #252525;
}

/* --- BASE DESKTOP LAYOUT --- */
.profile-container {
    display: flex;
    flex-wrap: wrap; 
    gap: 24px;
    padding: 0 20px;
    align-items: flex-start; 
}

.profile-avatar { 
    margin-top: -60px; 
    z-index: 5; 
    flex-shrink: 0; 
    order: 1; /* Explicitly set for reordering later */
}

.profile-info {
    flex: 1 1 250px; 
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-top: 15px; 
    padding-top: 0 !important;
    order: 2; /* Stays in the middle on desktop */
}

.profile-actions { 
    display: flex; 
    justify-content: flex-end; 
    align-items: flex-start; 
    gap: 15px; 
    padding-top: 15px; 
    flex-shrink: 0; 
    margin-left: auto; 
    order: 3; /* Stays on the right on desktop */
}

/* --- MOBILE LAYOUT OVERRIDE --- */
/* When the screen hits 650px, we forcefully swap the elements */
@media (max-width: 850px) {
    .profile-container {
        gap: 15px 24px; /* Reduces the vertical gap so the name isn't too far below */
    }
    
    .profile-actions {
        order: 2; /* Forces the boxes up next to the avatar */
        margin-left: auto; /* Keeps them glued to the right edge */
        padding-top: 5px; /* Aligns them nicely with the top half of the avatar */
    }
    
    .profile-info {
        order: 3; /* Forces the text to the bottom */
        flex-basis: 100%; /* Forces the text to take the full width, preventing it from creeping up */
        margin-top: -30px; /* Pulls the display name tight underneath the avatar and boxes */
    }
}

@media (max-width: 550px) {
    .profile-container {
        gap: 15px; /* Tightens the layout for small phone screens */
    }

    .profile-info {
        order: 2; /* Pulls text back up to sit next to the avatar */
        flex-basis: auto; /* Allows it to sit side-by-side with the avatar again */
        flex: 1 1 150px; /* Allows text to squeeze dynamically */
        margin-top: 15px; /* Resets the negative margin from the 650px query */
    }

    .profile-actions {
        order: 3; /* Pushes the buttons/boxes to the very bottom */
        width: 100%; /* Forces the actions to take up an entire new row */
        justify-content: flex-start; /* Aligns boxes to the left underneath the bio */
        margin-top: 5px; 
        padding-top: 0;
    }
}

/* 1. Push the Message button UP */
.btn-msg {
    align-self: flex-start; /* Pulls it toward the top of the container */
    margin-top: 10px;       /* Adjust this value to get it exactly where you want */
}

/* 2. Push the Stats boxes DOWN */
.profile-stats {
    align-self: flex-end;   /* Pushes it toward the bottom */
    margin-top: 5px;       /* Creates the gap from the banner you're looking for */
}

/* Ensure headings don't have invisible top margins */
.profile-info h1 {
    margin: 0;
    line-height: 1;
    font-size: 2rem;
}

/* Stats Cards Styling */
.profile-stats {
    display: flex;
    gap: 10px;
    background: var(--bg-2);
    padding: 10px;
    border-radius: 12px;
    border: 1px solid var(--border);
}
.stat-card {
    width: 80px;
    text-align: center;
    padding: 5px;
    background: var(--card);
    border-radius: 8px;
}
.stat-num { font-weight: bold; color: var(--primary); font-size: 1.1rem; }
.stat-label { font-size: 0.7rem; color: var(--text-muted); line-height: 1.1; }

/* Elements */
h1 { font-size: 1.8rem; margin: 0; }
.email { color: var(--text-muted); font-size: 0.9rem; }
#user-bio { margin: 0; font-size: 0.95rem; line-height: 1.5; }
#bio-fade {
    position: absolute; bottom: 0; left: 0; width: 100%; height: 20px;
    background: linear-gradient(transparent, var(--bg)); display: none;
}


/* Buttons */
.btn-msg { padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; }
.btn-text { background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 4px 8px; border-radius: 4px; cursor: pointer; }
.btn-save { background: rgba(0, 123, 255, 0.1); color: var(--primary); border: 1px solid var(--primary); padding: 5px 15px; border-radius: 4px; cursor: pointer; }
#see-more-btn { color: var(--primary); font-size: 0.85rem; text-decoration: none; font-weight: bold; display: none; }

/* --- BUTTON STYLES & HOVER EFFECTS --- */

/* 1. The Back Button (Pinned to top-right of the banner) */
.btn-back {
    position: absolute;
    top: 15px;
    right: 20px;
    background: rgba(0, 0, 0, 0.6); /* Semi-transparent dark background for readability */
    color: white;
    border: 1px solid rgba(255, 255, 255, 0.2);
    padding: 8px 16px;
    border-radius: 20px; /* Matches the pill shape of your Message button */
    font-weight: bold;
    cursor: pointer;
    backdrop-filter: blur(4px); /* Blurs the banner behind the button */
    transition: all 0.2s ease; /* Required for a smooth hover effect */
    z-index: 10; /* Ensures it stays clickable above the banner */
}

.btn-back:hover {
    background: rgba(0, 0, 0, 0.9);
    border-color: white;
    transform: translateY(-1px);
}

/* 2. Hover effect for the main Message button */
.btn-msg {
    transition: all 0.2s ease;
}
.btn-msg:hover {
    background: #0056b3; /* A darker shade of your primary blue */
    transform: translateY(-2px); /* Slight lift effect */
    box-shadow: 0 4px 12px rgba(0, 123, 255, 0.3);
}

/* 3. Hover effect for the Edit (Sửa / Đổi tên) buttons */
.btn-text {
    transition: all 0.2s ease;
}
.btn-text:hover {
    background: var(--card);
    color: var(--text);
    border-color: var(--text-muted);
}

/* 4. Hover effect for the Save (Lưu) buttons */
.btn-save {
    transition: all 0.2s ease;
}
.btn-save:hover {
    background: var(--primary);
    color: white;
}
</style>

// --- NEW CROPPER LOGIC ---
let cropper = null;
let currentCropType = ''; // 'avatar' or 'banner'

// 1. Intercept Avatar Upload
function uploadAvatar(event) {
    const file = event.target.files[0];
    if (file) openCropModal(file, 'avatar');
    event.target.value = ''; // Reset input so they can pick the same file again if needed
}

// 2. Intercept Banner Upload
function uploadBanner(event) {
    const file = event.target.files[0];
    if (file) openCropModal(file, 'banner');
    event.target.value = ''; 
}

// 3. Open the Editor Modal
function openCropModal(file, type) {
    if (file.size > 4 * 1024 * 1024) {
        alert("Ảnh quá lớn! Vui lòng chọn ảnh dưới 4MB.");
        return;
    }

    currentCropType = type;
    const imageElement = document.getElementById('image-to-crop');
    
    // Read file and put it in the modal
    const reader = new FileReader();
    reader.onload = function(e) {
        imageElement.src = e.target.result;
        document.getElementById('crop-modal').style.display = 'flex';
        
        // Destroy old cropper instance if it exists
        if (cropper) cropper.destroy();
        
        // Set ratio: 1:1 for Avatar, ~16:3 for Banner
        const aspectRatio = type === 'avatar' ? 1 : (1400 / 220); 

        // Initialize Cropper.js
        cropper = new Cropper(imageElement, {
            aspectRatio: aspectRatio,
            viewMode: 1, // Restrict crop box to not exceed canvas
            background: false,
            zoomable: true,
            movable: true
        });
    };
    reader.readAsDataURL(file);
}

// 4. Close Modal
function closeCropModal() {
    document.getElementById('crop-modal').style.display = 'none';
    if (cropper) cropper.destroy();
}

// 5. Save the Cropped Image to Supabase
async function saveCroppedImage() {
    if (!cropper) return;
    
    const btn = document.getElementById('save-crop-btn');
    btn.innerText = "Đang lưu...";
    btn.disabled = true;

    // Get the cropped result from the library
    // We limit width to keep the Base64 string from getting too massive for Supabase
    const canvas = cropper.getCroppedCanvas({
        maxWidth: currentCropType === 'avatar' ? 400 : 1200,
    });
    
    // Compress to JPEG to save space
    const base64Image = canvas.toDataURL('image/jpeg', 0.8); 
    
    // Prepare the update payload based on what we are editing
    const updateData = currentCropType === 'avatar' 
        ? { avatar_url: base64Image } 
        : { banner_url: base64Image };

    // Send to Supabase
    const { error } = await supabaseClient.auth.updateUser({ data: updateData });

    btn.innerText = "Lưu thay đổi";
    btn.disabled = false;

    if (error) {
        alert("Lỗi khi lưu ảnh: " + error.message);
        return;
    }

    // Success! Update the UI and close modal
    if (currentCropType === 'avatar') {
        const avatarDiv = document.getElementById('user-avatar');
        avatarDiv.innerText = '';
        avatarDiv.style.backgroundImage = `url(${base64Image})`;
    } else {
        document.getElementById('profile-banner').style.backgroundImage = `url(${base64Image})`;
    }

    closeCropModal();
}

        groupCard.onclick = () => window.location.href = `/group.html?id=${group.id || 1}`;

        groupCard.innerHTML = `
            <div style="width: 50px; height: 50px; border-radius: 10px; background: var(--card); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: bold; color: var(--primary); flex-shrink: 0;">
                ${groupName.charAt(0).toUpperCase()}
            </div>
            <div>
                <h4 style="margin: 0 0 4px 0; color: var(--text); font-size: 1.05rem;">${groupName}</h4>
                <p style="margin: 0; color: var(--text-muted); font-size: 0.85rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">${groupDesc}</p>
            </div>
        `;
        
        groupsContainer.appendChild(groupCard);
    });
}

function toggleSeeMore() {
    const wrapper = document.getElementById('bio-text-wrapper');
    const btn = document.getElementById('see-more-btn');
    const fade = document.getElementById('bio-fade');

    if (wrapper.style.maxHeight === '3em') {
        // Expand fully
        wrapper.style.maxHeight = 'none'; 
        btn.innerText = 'Show less';
        fade.style.display = 'none';
    } else {
        // Collapse back to 2 lines
        wrapper.style.maxHeight = '3em'; 
        btn.innerText = 'See more';
        fade.style.display = 'block';
    }
}

function checkBioLength() {
    // We use setTimeout to let the browser finish resizing the text before we do the math
    setTimeout(() => {
        const wrapper = document.getElementById('bio-text-wrapper');
        const bioText = document.getElementById('user-bio');
        const btn = document.getElementById('see-more-btn');
        const fade = document.getElementById('bio-fade');

        // Only hide/show if it's in the collapsed state
        if (wrapper.style.maxHeight === '3em') {
            // Compare the actual text height to the wrapper's 3em height
            if (bioText.scrollHeight > wrapper.clientHeight) {
                btn.style.display = 'inline-block';
                fade.style.display = 'block';
            } else {
                btn.style.display = 'none';
                fade.style.display = 'none';
            }
        }
    }, 50); // 50ms delay gives the browser time to paint the new layout
}

    loadProfile();
    loadUserGroups();
    // This tells the browser to re-check the bio height every time the window is resized!
    window.addEventListener('resize', checkBioLength);
    
</script>
