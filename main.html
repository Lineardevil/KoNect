<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>KoNect - Group Finder</title>
    <style>
        body { background-color: #0d1117; color: white; font-family: sans-serif; padding: 20px; }
        .box { border: 1px solid #30363d; padding: 15px; border-radius: 8px; margin-bottom: 20px; background: #161b22; display: none; }
        #vungDanhSach { display: block; border-color: #58a6ff; } 
        input, button { padding: 8px; margin: 5px 0; border-radius: 4px; border: 1px solid #30363d; }
        button { background-color: #238636; color: white; cursor: pointer; font-weight: bold; margin-right: 10px; }
        button:hover { background-color: #2ea043; }
        .group-item { border-bottom: 1px solid #30363d; padding: 10px; }
        .group-item:last-child { border-bottom: none; }
        .cong-tac-tong { background-color: #1f6feb; margin-bottom: 20px; padding: 12px 20px; font-size: 1.1em;}
        .cong-tac-tong:hover { background-color: #388bfd; }
    </style>
</head>
<body>

    <h1>KoNect Group Finder</h1>

    <div style="margin-bottom: 30px;">
        <button class="cong-tac-tong" onclick="batTatTinhNang('vungTimKiem')">Mở Tìm Kiếm</button>
        <button class="cong-tac-tong" onclick="batTatTinhNang('vungTaoNhom')">Mở Tạo Nhóm</button>
    </div>

    <div class="box" id="vungTimKiem">
        <h3>Tìm kiếm nhóm</h3>
        <input type="text" id="oTimKiem" placeholder="Nhập tên nhóm..." oninput="hamTimKiem()">
    </div>

    <div class="box" id="vungTaoNhom">
        <h3>Tạo nhóm mới</h3>
        <input type="text" id="tenNhomMoi" placeholder="Tên nhóm mới..."> <br>
        <label><input type="checkbox" id="chkChat"> Tự động tham gia nhóm chat</label> <br>
        <button onclick="hamTaoNhom()">Xác nhận Lập Nhóm</button>
    </div>

    <div class="box" id="vungDanhSach">
        <h3 style="color: #58a6ff;">Danh sách các nhóm hiện có</h3>
        <div id="vungHienThi"></div>
    </div>

    <script>
        let dsNhom = [const API_URL = "https://konect-ivory.vercel.app/api/groups";];

        function batTatTinhNang(idVung) {
            const tatCaCacBox = document.querySelectorAll('.box');
            tatCaCacBox.forEach(box => {
                if (box.id !== 'vungDanhSach') {
                    box.style.display = "none";
                }
            });
            const vungCanMo = document.getElementById(idVung);
            vungCanMo.style.display = "block";
        }

        function render(data = dsNhom) {
            const display = document.getElementById('vungHienThi');
            if (data.length === 0) {
                display.innerHTML = "Không tìm thấy kết quả.";
                return;
            }
            display.innerHTML = data.map(item => `
                <div class="group-item" style="display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <strong style="color: #58a6ff;">${item.ten}</strong> 
                        <br><small>${item.coChat ? "Nhóm công khai" : "Nhóm riêng tư"}</small>
                    </div>
                    <button onclick="thamGiaNhom('${item.ten}')" style="background-color: #1f6feb;">
                        Tham gia
                    </button>
                </div>
            `).join('');
        }

        function hamTimKiem() {
            const keyword = document.getElementById('oTimKiem').value.toLowerCase();
            const filtered = dsNhom.filter(n => n.ten.toLowerCase().includes(keyword));
            render(filtered);
        }

        async function hamTaoNhom() {
    const ten = document.getElementById('tenNhomMoi').value;
    const muonChat = document.getElementById('chkChat').checked;
    
    if (ten.trim() !== "") {
        const nhomMoi = { id: Date.now(), ten: ten, coChat: muonChat };

        await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(nhomMoi)
        });

       
        document.getElementById('tenNhomMoi').value = "";
        location.reload(); 
    }
}

        function thamGiaNhom(tenNhom) {
            window.alert("Đang kết nối vào nhóm: " + tenNhom);
            window.location.href = "chat.html?room=" + tenNhom;
        }

        window.onload = async () => {
    try {
        const response = await fetch(API_URL);
        const data = await response.json();
        dsNhom = data; 
        render(dsNhom);
    } catch (error) {
        console.error("Lỗi khi lấy danh sách nhóm:", error);
    }
};
    </script>
</body>
</html>
