<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu - KoNect</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #4a90e2; --bg: #121212; --card: #1e1e1e; --text: #eee; --border: #333; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: var(--card); padding: 35px; border-radius: 16px; width: 320px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        h2 { color: var(--primary); margin-bottom: 10px; font-size: 22px; }
        p { color: #888; font-size: 13px; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: #252525; color: white; box-sizing: border-box; outline: none; margin-bottom: 20px; font-size: 14px; }
        input:focus { border-color: var(--primary); }
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; background: var(--primary); color: white; cursor: pointer; font-weight: bold; font-size: 15px; transition: 0.3s; }
        button:hover { background: #357abd; transform: translateY(-1px); }
        #message { margin-top: 20px; font-size: 13px; min-height: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Mật khẩu mới</h2>
    <p>Vui lòng nhập mật khẩu mới cho tài khoản của bạn.</p>

    <input type="password" id="newPassword" placeholder="Tối thiểu 6 ký tự" required>
    <button id="updateBtn">Cập nhật mật khẩu</button>

    <div id="message"></div>
</div>

<script>
    const SUPABASE_URL = 'https://dfbklcbregcxzngpiorx.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRmYmtsY2JyZWdjeHpuZ3Bpb3J4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NTI2MTIsImV4cCI6MjA4OTQyODYxMn0.3EOOOodNiaa46ptAksdTY43_vknTIxhejcJCbVN441w';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    document.getElementById('updateBtn').onclick = async () => {
        const newPassword = document.getElementById('newPassword').value;
        const msg = document.getElementById('message');

        if (newPassword.length < 6) {
            msg.innerText = "Mật khẩu phải có ít nhất 6 ký tự!";
            msg.style.color = "#ff9800";
            return;
        }

        msg.innerText = "Đang cập nhật...";
        msg.style.color = "#aaa";

        // Lệnh cập nhật mật khẩu cho user đang trong phiên reset
        const { data, error } = await supabaseClient.auth.updateUser({
            password: newPassword
        });

        if (error) {
            msg.innerText = "Lỗi: " + error.message;
            msg.style.color = "#f44336";
        } else {
            msg.innerText = "✅ Thành công! Đang chuyển về trang Đăng nhập...";
            msg.style.color = "#4caf50";
            // Đợi 2 giây rồi về trang chủ
            setTimeout(() => window.location.href = '/', 2000);
        }
    };
</script>
</body>
</html>
